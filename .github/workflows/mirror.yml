name: Mirror to Public Repo vnm-zeroshot-eval
# see for troubleshooting: https://github.com/orgs/community/discussions/60392
on:
  push:
    branches: # Branches you want to mirror
      - ros2/nomad
      - ros2/navibridger
      - bunker/crossformer

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push branch to public mirror
        env:
          TOKEN: ${{ secrets.PUBLIC_VNM_EVAL_TOKEN }}
        run: |
          # 1. Setup the remote
          git remote add public "https://x-access-token:${TOKEN}@github.com/MaevaGuerrier/vnm-zeroshot-eval.git"
          
          # 2. Push the current branch to the same branch name on the public repo
          git push public HEAD:${{ github.ref_name }} --force