name: Mirror to Public Repo vnm-zeroshot-eval

on:
  push:
    branches:
      - ros2/nomad
      - ros2/navibridger
      - bunker/crossformer

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Mirror branch to public repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PUBLIC_VNM_EVAL_TOKEN }}
        with:
          source-directory: '.'
          destination-github-username: 'MaevaGuerrier'
          destination-repository-name: 'vnm-zeroshot-eval'
          target-branch: ${{ github.ref_name }}
          user-email: MaevaGuerrier@users.noreply.github.com
          user-name: MaevaGuerrier