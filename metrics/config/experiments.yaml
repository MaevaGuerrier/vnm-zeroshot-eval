augmentations:
  - brightness
  - blur
  - fog
  - sunFlare_overlay
  - sunFlare_physic
  - rain
  - rain_heavy
  - rain_drizzle
  - rain_torrential
  - reference # reference trajectory
  - no_augmentation 


radius:
  default: 2
  values:
    - 10


paths:
  bags_dir: "/workspace/metrics/bags/"
  dataframes_dir: "/workspace/metrics/dataframes/"
