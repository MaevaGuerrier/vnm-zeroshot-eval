robots:
  bunker:
    topics:
      odom: "/lvi_sam/lidar/mapping/odometry"
      reached_goal: "/topoplan/reached_goal"
      cmd_model: /cmd_vel
      closest_node: "/closest_node"
    data_header:
      odom:
        pose_x: pose.pose.position.x
        pose_y: pose.pose.position.y
        Time: Time
      cmd_model:
        lin_x_model: linear.x
        lin_y_model: linear.y
        Time: Time
      closest_node:
        closest_node: data
        Time: Time
      reached_goal:
        goal: data
        Time: Time
    process_bag_metrics:
      img_process_func: "process_custom_img"
      odom_process_func: "nav_to_xy_yaw"
      image_topic: "/usb_cam/image_raw" # Needed for closest node plotting
